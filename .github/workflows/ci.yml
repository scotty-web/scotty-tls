name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - run: nix-channel --update
      - run: nix-shell -p ghc -p zstd -p zstd.dev -p zlib -p zlib.dev --run 'cabal clean && cabal update && cabal build'
